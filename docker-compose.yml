services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    # command: sleep infinity    
    command: >
      sh -c "
      sleep 3 &&
      alembic -c /app/alembic.ini upgrade head &&
      uvicorn main:app --host 0.0.0.0 --port 8000
      "        
    ports:
      - "8061:8000"

  frontend:
    image: node:18
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm start"
    environment:
      - HOST=0.0.0.0
    ports:
      - "8062:3000"

 # frontend:
 #   build: ./frontend
 #   environment:
 #     - HOST=0.0.0.0
 #     - DANGEROUSLY_DISABLE_HOST_CHECK=true


  nginx:
    image: nginx:latest
    ports:
      - "8063:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
